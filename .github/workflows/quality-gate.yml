name: Quality Gate - ShopFast

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar testes (Regra 01 - Consistência Financeira)
        run: |
          pytest --maxfail=1 --disable-warnings -q

      - name: Verificar cobertura mínima (85%)
        run: |
          pip install pytest-cov
          pytest --cov=src --cov-fail-under=85

      - name: Bloquear lógica fora da camada de domínio (Regra 02)
        run: |
          if grep -r "discount" src/ \
            --exclude-dir=domain \
            --exclude-dir=tests \
            --exclude-dir=__pycache__ \
            --exclude="*.pyc"; then
            echo "Violação: regra de desconto fora da camada de domínio"
            exit 1
          fi

      - name: Quality Gate aprovado
        run: echo "Build aprovado - pronto para deploy"